# .github/workflows/Profile-Commit-Snake.yml
name: Generate Snake Animation

on:
  schedule:
    # Runs weekly on Sunday at midnight UTC
    - cron: "0 0 * * 0"
  # Allows manual triggering
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4
        with:
          # Only need the latest commit for this workflow
          fetch-depth: 1

      # Generates the snake SVG animation
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # GitHub username
          github_user_name: iiXXiXii
          # Define outputs with their paths and configurations
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#3a7bd5&color_dots=#0d1117,#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-snake-light.svg?palette=github-light&color_snake=#3a7bd5
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      # Pushes the generated files to the 'output' branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # The branch to push the generated files to
          target_branch: output
          # The directory containing the files to push
          build_dir: dist
          # Optional: Add commit message with timestamp
          commit_message: "Update snake animation [skip ci]"
        env:
          # GitHub token needed to push to the repository
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# .github/workflows/Profile-Activity.yml
name: GitHub Activity Updater

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  # Allows manual triggering
  workflow_dispatch:

jobs:
  build:
    name: Update GitHub Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # Increased to capture more activity history

      # Updates the README with recent GitHub activity
      - name: Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Update recent GitHub activity"
          MAX_LINES: 5
          # The README.md file path
          READ_ME_PATH: "./README.md"
          # Markers for activity section in README
          COMM_TOKEN: "<!--RECENT_ACTIVITY-->"
          END_TOKEN: "<!--END_SECTION:activity-->"
