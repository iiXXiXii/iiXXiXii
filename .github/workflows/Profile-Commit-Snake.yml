name: 🐍 Generate Snake Contribution Graph

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday
  workflow_dispatch:

jobs:
  generate-snake:
    name: Generate GitHub Snake Animation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: iiXXiXii
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#3a7bd5&color_dots=#0d1117,#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-snake-light.svg?palette=github-light&color_snake=#3a7bd5
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: 🚀 Deploy SVG to `output` Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
