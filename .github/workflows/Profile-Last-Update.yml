# .github/workflows/UpdateREADMEDate.yml
name: Update README Date Badge

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: "0 0 * * *"
  # Allows manual triggering
  workflow_dispatch:

jobs:
  update-readme-date:
    runs-on: ubuntu-latest
    permissions:
      # Required to commit changes back to the repository
      contents: write
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Updates the 'Last Updated' badge in README.md
      - name: Update last updated date badge
        run: |
          set -e # Exit on error

          # Get the current date string (e.g., "April 16, 2025")
          DATE_STR=$(date +'%B %d, %Y')
          # URL-encode the date string (replace spaces with %20)
          URL_ENCODED_DATE="${DATE_STR// /%20}"

          # Construct the new badge URL
          # Adjust colors (3a7bd5, 00d2ff) and style (for-the-badge) as needed to match your profile
          NEW_BADGE="<img src=\"https://img.shields.io/badge/Last%20Updated-${URL_ENCODED_DATE}-3a7bd5?style=for-the-badge&logo=github&logoColor=white&labelColor=%2300d2ff\" alt=\"Last Updated\"/>"

          # Use awk to replace content between placeholders - safer than broad sed
          awk -v badge="$NEW_BADGE" '
          BEGIN { printing = 1 }
          // { print; print badge; printing = 0 }
          // { printing = 1 }
          printing { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

          echo "Updated 'Last Updated' badge date to: $DATE_STR"

      # Commits and pushes the changes if the README.md file was modified
      - name: Commit changes
        run: |
          # Configure Git user
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add the modified README file
          git add README.md
          # Check if there are changes staged for commit
          git diff --quiet --staged || (git commit -m "Update README date badge [skip ci]" && git push)
