name: 🕒 Update Last Updated Badge

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  workflow_dispatch:

jobs:
  update-readme-date:
    name: Refresh 'Last Updated' Date Badge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🕓 Update Date Badge in README
        run: |
          DATE_STR=$(date +'%B %d, %Y')
          ENCODED_DATE="${DATE_STR// /%20}"
          BADGE="<img src=\\\"https://img.shields.io/badge/Last%20Updated-${ENCODED_DATE}-3a7bd5?style=for-the-badge\\&logo=github\\&logoColor=white\\&labelColor=%2300d2ff\\\" alt=\\\"Last Updated\\\"/>"

          sed -i -e "/<!-- LAST_UPDATED_BADGE -->/,/<!-- END_LAST_UPDATED_BADGE -->/c\\<!-- LAST_UPDATED_BADGE -->\n$BADGE\n<!-- END_LAST_UPDATED_BADGE -->" README.md

      - name: 💾 Commit Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README date badge [skip ci]" && git push
