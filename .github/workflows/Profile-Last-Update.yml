name: 🕒 Update Last Updated Badge

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  workflow_dispatch:
    inputs:
      timezone:
        description: 'Timezone for date display (e.g. UTC, America/New_York, Asia/Tokyo)'
        required: false
        default: 'UTC'
        type: string
      badge_color:
        description: 'Badge color (hex without #)'
        required: false
        default: '3a7bd5'
        type: string

jobs:
  update-readme-date:
    name: Refresh 'Last Updated' Date Badge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🕓 Update Date Badge in README
        id: update_badge
        run: |
          # Set timezone if provided, default to UTC
          TIMEZONE="${{ github.event.inputs.timezone || 'UTC' }}"
          export TZ=$TIMEZONE
          echo "Using timezone: $TIMEZONE"

          # Set badge colors with default or input values
          BADGE_COLOR="${{ github.event.inputs.badge_color || '3a7bd5' }}"
          LABEL_COLOR="00d2ff"

          # Format date with full month name, day with suffix, and year
          DATE_STR=$(date +'%B %d, %Y')
          ENCODED_DATE="${DATE_STR// /%20}"

          echo "Generated date: $DATE_STR"

          # Create badge with dynamic colors
          BADGE="<img src=\\\"https://img.shields.io/badge/Last%20Updated-${ENCODED_DATE}-${BADGE_COLOR}?style=for-the-badge\\&logo=github\\&logoColor=white\\&labelColor=%23${LABEL_COLOR}\\\" alt=\\\"Last Updated: ${DATE_STR}\\\"/>"

          # Check if README exists
          if [ ! -f "README.md" ]; then
            echo "::error::README.md not found in repository root!"
            exit 1
          fi

          # Update README with new badge
          if grep -q "<!-- LAST_UPDATED_BADGE -->" README.md; then
            sed -i -e "/<!-- LAST_UPDATED_BADGE -->/,/<!-- END_LAST_UPDATED_BADGE -->/c\\<!-- LAST_UPDATED_BADGE -->\n$BADGE\n<!-- END_LAST_UPDATED_BADGE -->" README.md
            echo "Badge updated successfully!"
          else
            echo "::warning::Badge markers not found in README.md!"
            exit 1
          fi

      - name: 💾 Commit Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update README date badge [skip ci]"
            git push
            echo "Successfully pushed README update to repository"
          else
            echo "No changes to commit"
          fi
