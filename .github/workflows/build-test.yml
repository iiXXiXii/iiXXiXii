name: Build & Test

on:
  push:
    branches: [ main, master, develop, feature/* ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.svg'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        type: choice
        options:
          - dev
          - test
          - prod
        default: 'dev'
        required: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BUILD_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  setup:
    name: Setup & Detect Projects
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.detect.outputs.has_java }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      java_version: ${{ steps.detect.outputs.java_version }}
      node_version: ${{ steps.detect.outputs.node_version }}
      python_version: ${{ steps.detect.outputs.python_version }}
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
      build_id: ${{ steps.meta.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set build metadata
        id: meta
        run: |
          echo "build_id=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "::notice::Build ID: $(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}"
      
      - name: Detect project types and versions
        id: detect
        run: |
          # Output variables for project types
          JAVA_EXISTS="false"
          NODE_EXISTS="false"
          PYTHON_EXISTS="false"
          
          # Set default versions
          JAVA_VERSION="17"
          NODE_VERSION="18"
          PYTHON_VERSION="3.11"
          
          # Check for Java projects (pom.xml or Gradle files)
          if find . -name "pom.xml" -o -name "*.gradle" -o -name "*.gradle.kts" -type f -not -path "*/\.*" | grep -q .; then
            JAVA_EXISTS="true"
            
            # Try to detect Java version from pom.xml or build.gradle
            if [ -f "pom.xml" ]; then
              POM_JAVA_VERSION=$(grep -o "<java.version>.*</java.version>" pom.xml | sed 's/<java.version>\(.*\)<\/java.version>/\1/' || echo "")
              if [ ! -z "$POM_JAVA_VERSION" ]; then
                JAVA_VERSION="$POM_JAVA_VERSION"
              fi
            elif [ -f "build.gradle" ]; then
              GRADLE_JAVA_VERSION=$(grep -o "sourceCompatibility.*" build.gradle | grep -o "[0-9]*" || echo "")
              if [ ! -z "$GRADLE_JAVA_VERSION" ]; then
                JAVA_VERSION="$GRADLE_JAVA_VERSION"
              fi
            fi
            
            echo "::notice::Detected Java project (version $JAVA_VERSION)"
          fi
          
          # Check for Node.js projects (package.json)
          if find . -name "package.json" -type f -not -path "*/node_modules/*" -not -path "*/\.*" | grep -q .; then
            NODE_EXISTS="true"
            
            # Try to detect Node version from package.json
            if [ -f "package.json" ]; then
              NODE_ENGINE_VERSION=$(grep -o '"node": "[^"]*"' package.json | sed 's/"node": "\(.*\)"/\1/' || echo "")
              if [ ! -z "$NODE_ENGINE_VERSION" ]; then
                # Extract major version from potential range like ">=14.0.0"
                NODE_VERSION=$(echo "$NODE_ENGINE_VERSION" | grep -o "[0-9]*" | head -1 || echo "18")
              fi
            fi
            
            echo "::notice::Detected Node.js project (version $NODE_VERSION)"
          fi
          
          # Check for Python projects (requirements.txt, setup.py, pyproject.toml)
          if find . -name "requirements.txt" -o -name "setup.py" -o -name "pyproject.toml" -type f -not -path "*/\.*" | grep -q .; then
            PYTHON_EXISTS="true"
            
            # Try to detect Python version from pyproject.toml or setup.py
            if [ -f "pyproject.toml" ]; then
              PYPROJECT_VERSION=$(grep -o "requires-python.*" pyproject.toml | grep -o "[0-9]\.[0-9]*" | head -1 || echo "")
              if [ ! -z "$PYPROJECT_VERSION" ]; then
                PYTHON_VERSION="$PYPROJECT_VERSION"
              fi
            elif [ -f "setup.py" ]; then
              SETUP_VERSION=$(grep -o "python_requires.*" setup.py | grep -o "[0-9]\.[0-9]*" | head -1 || echo "")
              if [ ! -z "$SETUP_VERSION" ]; then
                PYTHON_VERSION="$SETUP_VERSION"
              fi
            fi
            
            echo "::notice::Detected Python project (version $PYTHON_VERSION)"
          fi
          
          # Output basic detection results
          echo "has_java=$JAVA_EXISTS" >> $GITHUB_OUTPUT
          echo "has_node=$NODE_EXISTS" >> $GITHUB_OUTPUT
          echo "has_python=$PYTHON_EXISTS" >> $GITHUB_OUTPUT
          echo "java_version=$JAVA_VERSION" >> $GITHUB_OUTPUT
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          
          # Generate build matrix
          echo "build_matrix<<EOF" >> $GITHUB_OUTPUT
          echo '{
            "include": [' >> $GITHUB_OUTPUT
          
          if [ "$JAVA_EXISTS" == "true" ]; then
            echo '{
                "language": "java",
                "version": "'$JAVA_VERSION'"
              },' >> $GITHUB_OUTPUT
          fi
          
          if [ "$NODE_EXISTS" == "true" ]; then
            echo '{
                "language": "node",
                "version": "'$NODE_VERSION'"
              },' >> $GITHUB_OUTPUT
          fi
          
          if [ "$PYTHON_EXISTS" == "true" ]; then
            echo '{
                "language": "python",
                "version": "'$PYTHON_VERSION'"
              }' >> $GITHUB_OUTPUT
            
            # Add trailing comma if there are more languages
            if [ "$JAVA_EXISTS" == "true" ] || [ "$NODE_EXISTS" == "true" ]; then
              echo "," >> $GITHUB_OUTPUT
            fi
          fi
          
          echo ']
          }' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create summary
        run: |
          echo "# 🔍 Build & Test Configuration" > $GITHUB_STEP_SUMMARY
          echo "Build ID: **${{ steps.meta.outputs.build_id }}**" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ env.BUILD_ENV }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📊 Detected Projects" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Detected | Version |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.detect.outputs.has_java }}" == "true" ]; then
            echo "| Java | ✅ Yes | ${{ steps.detect.outputs.java_version }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Java | ❌ No | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.detect.outputs.has_node }}" == "true" ]; then
            echo "| Node.js | ✅ Yes | ${{ steps.detect.outputs.node_version }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Node.js | ❌ No | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.detect.outputs.has_python }}" == "true" ]; then
            echo "| Python | ✅ Yes | ${{ steps.detect.outputs.python_version }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Python | ❌ No | - |" >> $GITHUB_STEP_SUMMARY
          fi
  
  build:
    name: Build & Test ${{ matrix.language }}
    needs: setup
    if: ${{ needs.setup.outputs.has_java == 'true' || needs.setup.outputs.has_node == 'true' || needs.setup.outputs.has_python == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper versioning
      
      - name: Set up Java
        if: matrix.language == 'java'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.version }}
          cache: maven
      
      - name: Set up Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: 'npm'
      
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
          cache: 'pip'
      
      - name: Cache Gradle packages
        if: matrix.language == 'java' && hashFiles('**/*.gradle') != '' || hashFiles('**/*.gradle.kts') != ''
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Java-specific steps
      - name: Detect Java build system
        if: matrix.language == 'java'
        id: java-detect
        run: |
          if find . -name "pom.xml" -type f -not -path "*/\.*" | grep -q .; then
            echo "using_maven=true" >> $GITHUB_OUTPUT
          else
            echo "using_maven=false" >> $GITHUB_OUTPUT
          fi
          
          if find . -name "*.gradle" -o -name "*.gradle.kts" -type f -not -path "*/\.*" | grep -q .; then
            echo "using_gradle=true" >> $GITHUB_OUTPUT
          else
            echo "using_gradle=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Build with Maven
        if: matrix.language == 'java' && steps.java-detect.outputs.using_maven == 'true'
        run: |
          echo "::group::Maven Build"
          for POM in $(find . -name "pom.xml" -type f -not -path "*/\.*"); do
            echo "Building $POM with Maven"
            mvn -B package --file $POM -Dspring.profiles.active=${{ env.BUILD_ENV }}
          done
          echo "::endgroup::"
      
      - name: Build with Gradle
        if: matrix.language == 'java' && steps.java-detect.outputs.using_gradle == 'true'
        run: |
          echo "::group::Gradle Build"
          for GRADLE_FILE in $(find . -name "build.gradle" -o -name "build.gradle.kts" -type f -not -path "*/\.*"); do
            DIR=$(dirname $GRADLE_FILE)
            echo "Building in $DIR with Gradle"
            cd $DIR
            if [ -f "./gradlew" ]; then
              ./gradlew build -PactiveProfile=${{ env.BUILD_ENV }}
            else
              gradle build -PactiveProfile=${{ env.BUILD_ENV }}
            fi
            cd $GITHUB_WORKSPACE
          done
          echo "::endgroup::"
      
      - name: Run tests with Maven
        if: matrix.language == 'java' && steps.java-detect.outputs.using_maven == 'true'
        run: |
          echo "::group::Maven Tests"
          for POM in $(find . -name "pom.xml" -type f -not -path "*/\.*"); do
            echo "Testing $POM with Maven"
            mvn -B verify --file $POM -Dspring.profiles.active=${{ env.BUILD_ENV }}
          done
          echo "::endgroup::"
      
      # Node-specific steps
      - name: Find Node.js projects
        if: matrix.language == 'node'
        id: node-detect
        run: |
          echo "package_dirs<<EOF" >> $GITHUB_OUTPUT
          find . -name "package.json" -type f -not -path "*/node_modules/*" -not -path "*/\.*" | xargs -L1 dirname >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Install dependencies and build Node.js
        if: matrix.language == 'node'
        run: |
          echo "::group::Node.js Build"
          while IFS= read -r dir; do
            echo "Processing Node.js project in $dir"
            cd "$dir"
            
            # Determine package manager
            if [ -f "yarn.lock" ]; then
              echo "Installing dependencies with Yarn..."
              yarn install --frozen-lockfile
              
              # Set environment variables
              if [ -f ".env.${{ env.BUILD_ENV }}" ]; then
                cp .env.${{ env.BUILD_ENV }} .env
              fi
              
              # Check if there's a build script
              if grep -q '"build"' package.json; then
                echo "Building project with Yarn..."
                yarn build
              else
                echo "No build script found, skipping build"
              fi
            else
              echo "Installing dependencies with NPM..."
              npm ci
              
              # Set environment variables
              if [ -f ".env.${{ env.BUILD_ENV }}" ]; then
                cp .env.${{ env.BUILD_ENV }} .env
              fi
              
              # Check if there's a build script
              if grep -q '"build"' package.json; then
                echo "Building project with NPM..."
                npm run build
              else
                echo "No build script found, skipping build"
              fi
            fi
            
            cd $GITHUB_WORKSPACE
          done <<< "$(echo "${{ steps.node-detect.outputs.package_dirs }}")"
          echo "::endgroup::"
      
      - name: Run Node.js tests
        if: matrix.language == 'node'
        run: |
          echo "::group::Node.js Tests"
          while IFS= read -r dir; do
            cd "$dir"
            
            # Check for test script and use appropriate package manager
            if [ -f "yarn.lock" ]; then
              if grep -q '"test"' package.json; then
                echo "Running tests in $dir with Yarn..."
                yarn test
              else
                echo "No test script found in $dir, skipping tests"
              fi
            else
              if grep -q '"test"' package.json; then
                echo "Running tests in $dir with NPM..."
                npm test
              else
                echo "No test script found in $dir, skipping tests"
              fi
            fi
            
            cd $GITHUB_WORKSPACE
          done <<< "$(echo "${{ steps.node-detect.outputs.package_dirs }}")"
          echo "::endgroup::"
      
      # Python-specific steps
      - name: Find Python projects
        if: matrix.language == 'python'
        id: python-detect
        run: |
          echo "python_dirs<<EOF" >> $GITHUB_OUTPUT
          # Find directories containing requirements.txt, setup.py or pyproject.toml
          find . -name "requirements.txt" -o -name "setup.py" -o -name "pyproject.toml" -type f -not -path "*/\.*" | xargs -L1 dirname | sort -u >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          echo "::group::Python Setup"
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          
          while IFS= read -r dir; do
            echo "Installing dependencies for Python project in $dir"
            cd "$dir"
            
            # Check for environment-specific requirements
            if [ -f "requirements-${{ env.BUILD_ENV }}.txt" ]; then
              pip install -r "requirements-${{ env.BUILD_ENV }}.txt"
            elif [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            fi
            
            # Install package in development mode if setup.py exists
            if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
              pip install -e .
            fi
            
            cd $GITHUB_WORKSPACE
          done <<< "$(echo "${{ steps.python-detect.outputs.python_dirs }}")"
          echo "::endgroup::"
      
      - name: Run Python tests
        if: matrix.language == 'python'
        run: |
          echo "::group::Python Tests"
          while IFS= read -r dir; do
            echo "Running tests for Python project in $dir"
            cd "$dir"
            
            # Set environment
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            export ENVIRONMENT=${{ env.BUILD_ENV }}
            
            # Look for tests directory or test files
            if [ -d "tests" ] || [ -d "test" ] || find . -name "test_*.py" | grep -q .; then
              python -m pytest --cov=./ --cov-report=xml --cov-report=html
            else
              echo "No tests found in $dir"
            fi
            
            cd $GITHUB_WORKSPACE
          done <<< "$(echo "${{ steps.python-detect.outputs.python_dirs }}")"
          echo "::endgroup::"
      
      # Upload artifacts based on language
      - name: Upload Java artifacts
        if: matrix.language == 'java' && (steps.java-detect.outputs.using_maven == 'true' || steps.java-detect.outputs.using_gradle == 'true')
        uses: actions/upload-artifact@v3
        with:
          name: java-artifacts-${{ needs.setup.outputs.build_id }}
          path: |
            **/target/*.jar
            **/target/*.war
            **/build/libs/*.jar
            **/target/surefire-reports/
            **/build/reports/tests/
          retention-days: 7
      
      - name: Upload Node.js artifacts
        if: matrix.language == 'node'
        uses: actions/upload-artifact@v3
        with:
          name: node-artifacts-${{ needs.setup.outputs.build_id }}
          path: |
            **/dist/
            **/build/
            **/coverage/
          retention-days: 7
      
      - name: Upload Python artifacts
        if: matrix.language == 'python'
        uses: actions/upload-artifact@v3
        with:
          name: python-artifacts-${{ needs.setup.outputs.build_id }}
          path: |
            **/dist/
            **/build/
            **/htmlcov/
            **/*.egg-info/
            **/coverage.xml
            **/.coverage
          retention-days: 7
  
  report:
    name: Generate Build Reports
    if: always()
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts
      
      - name: Generate build summary
        run: |
          echo "# 📊 Build & Test Summary" > $GITHUB_STEP_SUMMARY
          echo "Build ID: **${{ needs.setup.outputs.build_id }}**" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ env.BUILD_ENV }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 🏗️ Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          # Check if any of the matrix builds succeeded
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            BUILD_SUCCESS="true"
            BUILD_COLOR="0x00cc00"
            
            if [[ "${{ needs.setup.outputs.has_java }}" == "true" ]]; then
              echo "| Java | ✅ Success | [View Artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.setup.outputs.has_node }}" == "true" ]]; then
              echo "| Node.js | ✅ Success | [View Artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.setup.outputs.has_python }}" == "true" ]]; then
              echo "| Python | ✅ Success | [View Artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            BUILD_SUCCESS="false"
            BUILD_COLOR="0xff3333"
            
            if [[ "${{ needs.setup.outputs.has_java }}" == "true" ]]; then
              echo "| Java | ❌ Failed | [View Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.setup.outputs.has_node }}" == "true" ]]; then
              echo "| Node.js | ❌ Failed | [View Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.setup.outputs.has_python }}" == "true" ]]; then
              echo "| Python | ❌ Failed | [View Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "build_success=$BUILD_SUCCESS" >> $GITHUB_ENV
          echo "build_color=$BUILD_COLOR" >> $GITHUB_ENV
      
      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "${{ env.build_success == 'true' && '✅ Build & Tests Passed' || '❌ Build & Tests Failed' }}"
          description: |
            Environment: **${{ env.BUILD_ENV }}**
            Build ID: **${{ needs.setup.outputs.build_id }}**
            
            Check the workflow run for detailed reports and artifacts.
          color: ${{ env.build_color }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} 