name: Dependency Vulnerability Scanning

on:
  schedule:
    # Runs at 02:00 UTC every Monday
    - cron: "0 2 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@v3.1.3
        with:
          project: "iiXXiXii"
          path: "."
          format: "HTML"
          args: >
            --enableExperimental
            --scan .
            --suppression suppressions.xml
            --failOnCVSS 7

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: reports
          retention-days: 7

      - name: GitHub Security Dashboard Report
        if: github.event_name != 'schedule'
        uses: dependency-check/dependency-check-github-action-reporter@v0.6
        with:
          report-path: reports/dependency-check-report.xml
