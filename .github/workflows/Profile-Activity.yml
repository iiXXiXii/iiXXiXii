# .github/workflows/Profile-Activity.yml
name: 🔍 GitHub Activity Updater

on:
  schedule:
    # Runs every 12 hours instead of 6 (more efficient)
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      max_entries:
        description: 'Maximum number of activity entries to display'
        required: false
        default: '5'
        type: choice
        options: ['3', '5', '7', '10']

jobs:
  build:
    name: Update GitHub Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 100 # Increased to capture more activity history

      - name: 📊 Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use input parameter if workflow was manually triggered
          MAX_LINES: ${{ github.event.inputs.max_entries || '5' }}
          README_PATH: "./README.md"
          COMMIT_MSG: "📝 Update recent GitHub activity"
          TARGET_HEADER: "## 🔭 Recent GitHub Activity"
          TARGET_FOOTER: "<!--END_SECTION:activity-->"
          INITIAL_PLACEHOLDER: "<!-- RECENT_ACTIVITY -->"

      - name: 🚨 Report Status
        if: ${{ failure() }}
        run: |
          echo "::warning::Activity update workflow failed. Please check logs for more details."
