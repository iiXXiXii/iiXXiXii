# .github/workflows/Profile-Activity.yml
name: 🔍 GitHub Activity Updater

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  # Allows manual triggering
  workflow_dispatch:

jobs:
  build:
    name: Update GitHub Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checks out the repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 100 # Increased to capture more activity history

      # Updates the README with recent GitHub activity
      - name: 📊 Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Specify the README location
          README_PATH: "./README.md"
          # Maximum number of activity items to show
          MAX_LINES: 5
          # Activity header text - use as a section marker
          COMMIT_MSG: "Update recent GitHub activity"
          # This should match the section header in your README
          TARGET_HEADER: "## 🔭 Recent GitHub Activity"
          # This should match the footer marker in your README
          TARGET_FOOTER: "<!--END_SECTION:activity-->"
          # Adding a placeholder for the activity section
          INITIAL_PLACEHOLDER: "<!-- RECENT_ACTIVITY -->"
