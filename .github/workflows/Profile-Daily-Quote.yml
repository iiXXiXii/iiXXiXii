name: 🌟 Daily Dev Quote

on:
  schedule:
    - cron: "0 0 * * *" # Every day
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force quote refresh even if already updated today'
        type: boolean
        default: false

jobs:
  daily-quote:
    name: Inject Quote of the Day
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📚 Setup Quote Database
        run: |
          # Create quotes directory if it doesn't exist
          mkdir -p .github/quotes

          if [ ! -f .github/quotes/dev_quotes.json ]; then
            # Create quotes database with expanded collection
            cat > .github/quotes/dev_quotes.json << 'EOF'
            [
              {"quote": "First, solve the problem. Then, write the code.", "author": "John Johnson"},
              {"quote": "Code is like humor. When you have to explain it, it's bad.", "author": "Cory House"},
              {"quote": "It's not a bug – it's an undocumented feature.", "author": "Anonymous"},
              {"quote": "The best error message is the one that never shows up.", "author": "Thomas Fuchs"},
              {"quote": "The most disastrous thing that you can ever learn is your first programming language.", "author": "Alan Kay"},
              {"quote": "Programming isn't about what you know; it's about what you can figure out.", "author": "Chris Pine"},
              {"quote": "The only way to learn a new programming language is by writing programs in it.", "author": "Dennis Ritchie"},
              {"quote": "Sometimes it pays to stay in bed on Monday, rather than spending the rest of the week debugging Monday's code.", "author": "Dan Salomon"},
              {"quote": "That's the thing about people who think they hate computers. What they really hate is lousy programmers.", "author": "Larry Niven"},
              {"quote": "A language that doesn't affect the way you think about programming is not worth knowing.", "author": "Alan J. Perlis"},
              {"quote": "The computer was born to solve problems that did not exist before.", "author": "Bill Gates"},
              {"quote": "Talk is cheap. Show me the code.", "author": "Linus Torvalds"},
              {"quote": "Always code as if the guy who ends up maintaining your code will be a violent psychopath who knows where you live.", "author": "John Woods"},
              {"quote": "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", "author": "Martin Fowler"},
              {"quote": "Simplicity is the soul of efficiency.", "author": "Austin Freeman"}
            ]
            EOF
          fi

      - name: 🧠 Choose and Update Quote
        id: quote
        run: |
          set -e

          # Use jq to validate JSON and ensure it's properly formatted
          jq . .github/quotes/dev_quotes.json > /dev/null

          QUOTE_COUNT=$(jq length .github/quotes/dev_quotes.json)
          [ "$QUOTE_COUNT" -eq 0 ] && echo "No quotes available!" && exit 1

          # Use date as seed but allow manual override
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.force_refresh }}" == "true" ]]; then
            # Use random index if manually triggered with force refresh
            INDEX=$((RANDOM % QUOTE_COUNT))
          else
            # Use date-based selection for consistency
            INDEX=$(date +%j)  # Day of year for better distribution
            INDEX=$((INDEX % QUOTE_COUNT))
