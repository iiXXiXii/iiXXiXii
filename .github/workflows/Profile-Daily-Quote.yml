# .github/workflows/Quote of the Day.yml
name: Daily Inspiration Quote

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: "0 0 * * *"
  # Allows manual triggering
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      # Required to commit changes back to the repository
      contents: write
    steps:
      # Checks out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Optimized checkout for faster processing, only need latest commit
          fetch-depth: 1

      # Creates the quotes database if it doesn't exist
      - name: Set up quotes database
        id: setup-quotes
        run: |
          if [ ! -f ./quotes.json ]; then
            echo '[
              {"quote": "Code is like humor. When you have to explain it, it''s bad.", "author": "Cory House", "category": "coding"},
              {"quote": "Clean code always looks like it was written by someone who cares.", "author": "Robert C. Martin", "category": "coding"},
              {"quote": "Programming isn''t about what you know; it''s about what you can figure out.", "author": "Chris Pine", "category": "coding"},
              {"quote": "The best error message is the one that never shows up.", "author": "Thomas Fuchs", "category": "coding"},
              {"quote": "First, solve the problem. Then, write the code.", "author": "John Johnson", "category": "problem-solving"},
              {"quote": "Make it work, make it right, make it fast.", "author": "Kent Beck", "category": "development"},
              {"quote": "It''s not a bug – it''s an undocumented feature.", "author": "Anonymous", "category": "humor"},
              {"quote": "Software and cathedrals are much the same — first we build them, then we pray.", "author": "Sam Redwine", "category": "development"},
              {"quote": "Code is read much more often than it is written.", "author": "Guido van Rossum", "category": "coding"},
              {"quote": "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", "author": "Martin Fowler", "category": "coding"},
              {"quote": "Simplicity is the soul of efficiency.", "author": "Austin Freeman", "category": "philosophy"},
              {"quote": "Before software can be reusable it first has to be usable.", "author": "Ralph Johnson", "category": "design"},
              {"quote": "The art of programming is the skill of controlling complexity.", "author": "Marijn Haverbeke", "category": "complexity"},
              {"quote": "Programming today is a race between software engineers striving to build bigger and better idiot-proof programs, and the universe trying to produce bigger and better idiots. So far, the universe is winning.", "author": "Rick Cook", "category": "humor"}
            ]' > ./quotes.json
          fi

      # Selects a quote based on the date and updates the README
      - name: Generate and Inject Quote of the Day
        id: quote
        run: |
          set -e # Exit immediately if a command exits with a non-zero status.

          # Get total number of quotes
          QUOTE_COUNT=$(jq length quotes.json)
          if [ -z "$QUOTE_COUNT" ] || [ "$QUOTE_COUNT" -eq 0 ]; then
            echo "Error: Could not read quotes or quotes.json is empty."
            exit 1
          fi

          # Get current date as seed (YYYYMMDD)
          DATE_SEED=$(date +%Y%m%d)

          # Select index based on date seed
          INDEX=$((DATE_SEED % QUOTE_COUNT))

          # Get the quote and author for today using jq
          QUOTE=$(jq -r ".[$INDEX].quote" quotes.json)
          AUTHOR=$(jq -r ".[$INDEX].author" quotes.json)

          if [ -z "$QUOTE" ] || [ -z "$AUTHOR" ]; then
            echo "Error: Failed to extract quote or author for index $INDEX."
            exit 1
          fi

          # Prepare the Markdown content for the quote
          MARKDOWN_QUOTE="> **\"$QUOTE\"**\n>\n> — _$AUTHOR_"

          # Use sed to replace content between placeholders - more reliable than awk for this case
          sed -i -e "/<!-- QUOTE_OF_THE_DAY -->/,/<!-- END_QUOTE_OF_THE_DAY -->/c\<!-- QUOTE_OF_THE_DAY -->\n$MARKDOWN_QUOTE\n<!-- END_QUOTE_OF_THE_DAY -->" README.md

          echo "Updated quote of the day to: '$QUOTE' by $AUTHOR"

      # Commits and pushes the changes if the README.md file was modified
      - name: Commit changes
        run: |
          # Configure Git user
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add the modified README file
          git add README.md
          # Check if there are changes staged for commit
          git diff --quiet --staged || (git commit -m "Update quote of the day [skip ci]" && git push)
