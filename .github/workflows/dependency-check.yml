name: Dependency Security Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays
  push:
    branches: [ main, master, develop ]
    paths:
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - '**/pom.xml'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/yarn.lock'
      - '**/requirements.txt'
      - '**/pyproject.toml'
      - '**/setup.py'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - '**/pom.xml'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/yarn.lock'
      - '**/requirements.txt'
      - '**/pyproject.toml'
      - '**/setup.py'
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: dependency-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize Scan
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      date: ${{ steps.date.outputs.date }}
    steps:
      - name: Check repository
        id: check
        run: |
          # Determine if we should run the scan (handle forks)
          if [[ "${{ github.repository_owner }}" == "iiXXiXii" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "::notice::Dependency scan skipped: Not in main repository or manually triggered"
          fi
      
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  java-dependency-check:
    name: Java Dependency Check
    needs: init
    if: needs.init.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for proper analysis
          
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          
      - name: Cache Gradle packages
        uses: actions/cache@v3
        if: hashFiles('**/*.gradle') != '' || hashFiles('**/*.gradle.kts') != ''
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
          
      - name: Check for Java projects
        id: check-java
        run: |
          if find . -name "pom.xml" -o -name "*.gradle" -o -name "*.gradle.kts" -type f -not -path "*/\.*" | grep -q .; then
            echo "java_exists=true" >> $GITHUB_OUTPUT
          else
            echo "java_exists=false" >> $GITHUB_OUTPUT
          fi
          
          if find . -name "pom.xml" -type f -not -path "*/\.*" | grep -q .; then
            echo "maven_exists=true" >> $GITHUB_OUTPUT
          else
            echo "maven_exists=false" >> $GITHUB_OUTPUT
          fi
          
          if find . -name "*.gradle" -o -name "*.gradle.kts" -type f -not -path "*/\.*" | grep -q .; then
            echo "gradle_exists=true" >> $GITHUB_OUTPUT
          else
            echo "gradle_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Maven dependency vulnerability check
        if: steps.check-maven.outputs.maven_exists == 'true'
        run: |
          echo "Running OWASP Dependency Check for Maven projects"
          for POM in $(find . -name "pom.xml" -type f -not -path "*/\.*"); do
            echo "Checking $POM"
            mvn org.owasp:dependency-check-maven:check -f $POM
          done
          
      - name: Gradle dependency vulnerability check
        if: steps.check-gradle.outputs.gradle_exists == 'true'
        run: |
          echo "Running OWASP Dependency Check for Gradle projects"
          for GRADLE_FILE in $(find . -name "*.gradle" -o -name "*.gradle.kts" -type f -not -path "*/\.*"); do
            DIR=$(dirname $GRADLE_FILE)
            echo "Checking $GRADLE_FILE"
            cd $DIR
            if [ -f "./gradlew" ]; then
              ./gradlew dependencyCheckAnalyze
            else
              echo "No Gradle wrapper found in $DIR, skipping"
            fi
            cd $GITHUB_WORKSPACE
          done
          
      - name: Generate summary report
        run: |
          echo "## Dependency Vulnerability Summary" > $GITHUB_STEP_SUMMARY
          echo "Scan completed at $(date)" >> $GITHUB_STEP_SUMMARY
          
          # Add Maven results if any
          if [ "${{ steps.check-maven.outputs.maven_exists }}" == "true" ]; then
            echo "### Maven Projects" >> $GITHUB_STEP_SUMMARY
            find . -name "dependency-check-report.html" -type f -not -path "*/\.*" | while read report; do
              project_dir=$(dirname $report)
              echo "- [${project_dir#./}](${report#./})" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          # Add Gradle results if any
          if [ "${{ steps.check-gradle.outputs.gradle_exists }}" == "true" ]; then
            echo "### Gradle Projects" >> $GITHUB_STEP_SUMMARY
            find . -path "*/build/reports/dependency-check-report.html" -type f | while read report; do
              project_dir=$(dirname $(dirname $(dirname $report)))
              echo "- [${project_dir#./}](${report#./})" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-reports
          path: |
            **/dependency-check-report.html
            **/dependency-check-report.xml
            **/build/reports/dependency-check-report.html
          retention-days: 7
          
  node-dependency-check:
    name: Node.js Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository_owner == 'iiXXiXii'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Check for package.json
        id: check-node
        run: |
          if find . -name "package.json" -type f -not -path "*/node_modules/*" -not -path "*/\.*" | grep -q .; then
            echo "node_exists=true" >> $GITHUB_OUTPUT
          else
            echo "node_exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Run npm audit
        if: steps.check-node.outputs.node_exists == 'true'
        run: |
          for PKG in $(find . -name "package.json" -type f -not -path "*/node_modules/*" -not -path "*/\.*"); do
            DIR=$(dirname $PKG)
            echo "Running npm audit in $DIR"
            cd $DIR
            # Create report in JSON format
            npm audit --json > npm-audit-report.json || true
            cd $GITHUB_WORKSPACE
          done
          
      - name: Generate npm audit summary
        if: steps.check-node.outputs.node_exists == 'true'
        run: |
          echo "### Node.js Projects" >> $GITHUB_STEP_SUMMARY
          for REPORT in $(find . -name "npm-audit-report.json" -type f); do
            DIR=$(dirname $REPORT)
            echo "#### Project: ${DIR#./}" >> $GITHUB_STEP_SUMMARY
            
            # Parse audit report
            HIGH_COUNT=$(cat $REPORT | grep -o '"high"' | wc -l)
            CRITICAL_COUNT=$(cat $REPORT | grep -o '"critical"' | wc -l)
            
            echo "- High Severity Issues: $HIGH_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- Critical Severity Issues: $CRITICAL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          
      - name: Upload npm audit reports
        if: steps.check-node.outputs.node_exists == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-reports
          path: '**/npm-audit-report.json'
          retention-days: 7
          
  python-dependency-check:
    name: Python Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository_owner == 'iiXXiXii'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Check for requirements.txt
        id: check-python
        run: |
          if find . -name "requirements.txt" -type f -not -path "*/\.*" | grep -q .; then
            echo "python_exists=true" >> $GITHUB_OUTPUT
          else
            echo "python_exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Install safety
        if: steps.check-python.outputs.python_exists == 'true'
        run: pip install safety
          
      - name: Run safety check
        if: steps.check-python.outputs.python_exists == 'true'
        run: |
          echo "### Python Projects" >> $GITHUB_STEP_SUMMARY
          
          for REQ in $(find . -name "requirements.txt" -type f -not -path "*/\.*"); do
            DIR=$(dirname $REQ)
            echo "#### Project: ${DIR#./}" >> $GITHUB_STEP_SUMMARY
            
            cd $DIR
            # Run safety check
            REPORT=$(safety check -r requirements.txt --json)
            ISSUES=$(echo $REPORT | grep -o '"vulnerabilities":' | wc -l)
            
            echo "- Vulnerabilities Found: $ISSUES" >> $GITHUB_STEP_SUMMARY
            echo "$REPORT" > safety-report.json
            cd $GITHUB_WORKSPACE
          done
          
      - name: Upload safety reports
        if: steps.check-python.outputs.python_exists == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: python-safety-reports
          path: '**/safety-report.json'
          retention-days: 7
          
  notify-discord:
    name: Notify Discord on Issues
    needs: [java-dependency-check, node-dependency-check, python-dependency-check]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'iiXXiXii' && github.event_name != 'pull_request'
    
    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        if: env.DISCORD_WEBHOOK != ''
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Dependency Security Scan Completed"
          description: "Scan completed for ${{ github.repository }}. Check the workflow for details."
          color: 0x0099ff
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} 