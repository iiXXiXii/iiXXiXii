name: Update Daily Quote

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight every day
  workflow_dispatch:  # Allows manual triggering

concurrency:
  group: quote-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_KEY: quote-cache-${{ github.run_id }}
  PYTHON_VERSION: '3.11'

jobs:
  update-quote:
    name: Update Daily Developer Quote
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '.github/requirements-quote.txt'

      - name: Create requirements file
        run: |
          mkdir -p .github
          cat > .github/requirements-quote.txt << 'EOF'
          requests==2.31.0
          python-dateutil==2.8.2
          markdown==3.5.1
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-quote.txt

      - name: Update Quote
        id: update_quote
        run: |
          cat > update_quote.py << 'EOF'
          import re
          import random
          import json
          import requests
          import sys
          import os
          from datetime import datetime
          from pathlib import Path

          # Configure logging
          def log(message, level="INFO"):
              timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
              print(f"[{timestamp}] {level}: {message}")

          # List of developer quotes - we'll use these as a fallback if API fails
          fallback_quotes = [
            {"quote": "It's not a bug – it's an undocumented feature.", "author": "Anonymous"},
            {"quote": "Code is like humor. When you have to explain it, it's bad.", "author": "Cory House"},
            {"quote": "First, solve the problem. Then, write the code.", "author": "John Johnson"},
            {"quote": "Make it work, make it right, make it fast.", "author": "Kent Beck"},
            {"quote": "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", "author": "Martin Fowler"},
            {"quote": "Talk is cheap. Show me the code.", "author": "Linus Torvalds"},
            {"quote": "The best way to predict the future is to implement it.", "author": "David Heinemeier Hansson"},
            {"quote": "Programming isn't about what you know; it's about what you can figure out.", "author": "Chris Pine"},
            {"quote": "The only way to learn a new programming language is by writing programs in it.", "author": "Dennis Ritchie"},
            {"quote": "Sometimes it's better to leave something alone, to pause, and that's very true of programming.", "author": "Joyce Wheeler"},
            {"quote": "Simplicity is the soul of efficiency.", "author": "Austin Freeman"},
            {"quote": "Good code is its own best documentation.", "author": "Steve McConnell"},
            {"quote": "The most disastrous thing that you can ever learn is your first programming language.", "author": "Alan Kay"},
            {"quote": "The art of programming is the skill of controlling complexity.", "author": "Marijn Haverbeke"},
            {"quote": "Testing leads to failure, and failure leads to understanding.", "author": "Burt Rutan"},
            {"quote": "The best error message is the one that never shows up.", "author": "Thomas Fuchs"},
            {"quote": "It's harder to read code than to write it.", "author": "Joel Spolsky"},
            {"quote": "Code never lies, comments sometimes do.", "author": "Ron Jeffries"},
            {"quote": "Programming is the art of telling another human what one wants the computer to do.", "author": "Donald Knuth"},
            {"quote": "A programming language is for thinking about programs, not for expressing programs you've already thought of.", "author": "Paul Graham"}
          ]

          # Array of APIs to try (with fallback options)
          quote_apis = [
              {
                  "url": "https://programming-quotesapi.vercel.app/api/random",
                  "quote_key": "quote",
                  "author_key": "author"
              },
              {
                  "url": "https://quotes.rest/qod?category=inspire",
                  "quote_key": "contents.quotes[0].quote",
                  "author_key": "contents.quotes[0].author"
              },
              {
                  "url": "https://api.quotable.io/random?tags=technology",
                  "quote_key": "content",
                  "author_key": "author"
              }
          ]

          def get_nested_value(data, key_path):
              """Get a value from a nested dictionary using a dot-separated path."""
              keys = key_path.split(".")
              value = data
              try:
                  for k in keys:
                      if k.endswith("]"):
                          # Handle array access like "quotes[0]"
                          array_key, index = k[:-1].split("[")
                          value = value[array_key][int(index)]
                      else:
                          value = value[k]
                  return value
              except (KeyError, IndexError, TypeError):
                  return None

          # Print timestamp for logging
          log(f"Running quote update at {datetime.now().isoformat()}")

          quote = ""
          author = ""
          api_success = False

          # Try each API in order
          for api in quote_apis:
              if api_success:
                  break
                  
              try:
                  log(f"Attempting to fetch quote from {api['url']}")
                  # Add a timeout to prevent hanging
                  response = requests.get(api["url"], timeout=5)

                  # Check for successful response
                  if response.status_code == 200:
                      data = response.json()
                      quote = get_nested_value(data, api["quote_key"])
                      author = get_nested_value(data, api["author_key"])

                      if quote and author:
                          log(f"Successfully fetched quote from {api['url']}")
                          api_success = True
                      else:
                          log(f"Empty quote or author from {api['url']}", "WARNING")
                  else:
                      log(f"API {api['url']} returned error code: {response.status_code}", "WARNING")
              except Exception as e:
                  log(f"Error fetching quote from {api['url']}: {str(e)}", "ERROR")

          # If all APIs fail, use one of our fallback quotes
          if not api_success:
              log("All APIs failed, using fallback quote", "WARNING")
              quote_data = random.choice(fallback_quotes)
              quote = quote_data["quote"]
              author = quote_data["author"]

          log(f"Quote selected: '{quote}' by {author}")

          # Get current date for the badge
          current_date = datetime.now().strftime("%B %d, %Y")
          update_time = datetime.now().strftime("%H:%M UTC, %B %d, %Y")
          
          # Create the quote section with HTML
          new_quote_section = f"""<!-- QUOTE_OF_THE_DAY:START -->
<div align="center">
  <table>
    <tr>
      <td align="center">
        <img src="https://img.shields.io/badge/Daily%20Quote-{current_date.replace(' ', '%20')}-228be6?style=for-the-badge&logo=quotefancy&logoColor=white" alt="Daily Quote"/>
        <br/>
        <i>"{quote}"</i>
        <br/>
        <b>— {author}</b>
        <br/><br/>
        <sub>Quote refreshes daily. Last update: {update_time}</sub>
      </td>
    </tr>
  </table>
</div>
<!-- QUOTE_OF_THE_DAY:END -->"""

          # Read README file
          try:
              readme_path = Path('README.md')
              if not readme_path.exists():
                  log("README.md not found", "ERROR")
                  sys.exit(1)
                  
              with open(readme_path, 'r', encoding='utf-8') as file:
                  readme = file.read()

              # Replace the quote section in README
              quote_pattern = r'<!-- QUOTE_OF_THE_DAY:START -->.*?<!-- QUOTE_OF_THE_DAY:END -->'
              updated_readme = re.sub(quote_pattern, new_quote_section, readme, flags=re.DOTALL)

              # Check if the content actually changed
              if updated_readme == readme:
                  log("No changes needed in README.md")
                  # Still return success since this isn't an error
                  sys.exit(0)

              # Write updated content back to README
              with open(readme_path, 'w', encoding='utf-8') as file:
                  file.write(updated_readme)

              log(f"Updated quote in README.md successfully")

              # Output for GitHub Actions
              with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as f:
                  f.write(f"QUOTE_AUTHOR={author}\n")
                  f.write(f"QUOTE_TEXT={quote}\n")
                  f.write(f"QUOTE_UPDATE_SUCCESS=true\n")

              sys.exit(0)  # Success
          except Exception as e:
              log(f"Error updating README: {str(e)}", "ERROR")
              # Output for GitHub Actions
              with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as f:
                  f.write(f"QUOTE_UPDATE_SUCCESS=false\n")
              sys.exit(1)  # Failure
          EOF

          python update_quote.py

      - name: Create summary
        if: always()
        run: |
          echo "# Daily Quote Update Summary" > $GITHUB_STEP_SUMMARY
          echo "Run Date: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ env.QUOTE_UPDATE_SUCCESS }}" == "true" ]]; then
            echo "## ✅ Quote Updated Successfully" >> $GITHUB_STEP_SUMMARY
            echo "> **\"${{ env.QUOTE_TEXT }}\"**" >> $GITHUB_STEP_SUMMARY
            echo "> — _${{ env.QUOTE_AUTHOR }}_" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Quote Update Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the job logs for more details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "docs: update daily developer quote [skip ci]"
            git push
            echo "Quote updated successfully!"
          else
            echo "No changes to commit"
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Failed to update daily quote. Check the logs for details."
