name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly on Sunday at midnight
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check API rate limits
        id: check-limit
        run: |
          LIMIT_REMAINING=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" https://api.github.com/rate_limit | jq .rate.remaining)
          echo "LIMIT_REMAINING=$LIMIT_REMAINING" >> $GITHUB_ENV
          echo "Rate limit remaining: $LIMIT_REMAINING"
          if [ "$LIMIT_REMAINING" -lt 100 ]; then
            echo "⚠️ Low on GitHub API rate limit. Skipping stats generation."
            echo "SKIP_GENERATION=true" >> $GITHUB_ENV
          else
            echo "SKIP_GENERATION=false" >> $GITHUB_ENV
          fi

      - name: Generate GitHub Stats README
        if: env.SKIP_GENERATION == 'false'
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: true
          SHOW_PROFILE_VIEWS: true
          SHOW_COMMIT: true
          SHOW_DAYS_OF_WEEK: true
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_PROJECTS: false
          SHOW_TIMEZONE: true
          SHOW_EDITORS: true
          SHOW_LANGUAGE_PER_REPO: false
          SHOW_SHORT_INFO: false
          SHOW_LOC_CHART: false

      - name: Generate Repository Statistics
        if: env.SKIP_GENERATION == 'false'
        run: |
          echo "Generating repository statistics..."

          # Create stats directory if it doesn't exist
          mkdir -p ./stats

          # Get repository data
          curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/users/iiXXiXii/repos?per_page=100&sort=updated" > ./stats/repos.json

          # Extract stats to JSON file for use in README
          jq '[.[] | {name: .name, stars: .stargazers_count, forks: .forks_count, issues: .open_issues_count, language: .language}]' \
            ./stats/repos.json > ./stats/repo_stats.json

          echo "Repository statistics updated successfully!"

      - name: Commit changes
        if: env.SKIP_GENERATION == 'false'
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHub stats [skip ci]" && git push)
