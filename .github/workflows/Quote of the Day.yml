name: Daily Inspiration Quote

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Quote
        uses: actions/github-script@v6
        id: generate-quote
        with:
          script: |
            const quotes = require('./quotes.json');
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            console.log(`Quote: ${randomQuote.quote}`);
            console.log(`Author: ${randomQuote.author}`);
            core.setOutput('quote', randomQuote.quote);
            core.setOutput('author', randomQuote.author);

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          title: "✨ Daily Inspiration Quote"
          commit-message: "✨ Daily Inspiration Quote"
          body: |
            ✨ Daily Inspiration Quote
            ---
            > **"${{ steps.generate-quote.outputs.quote }}"**
            >
            > — *${{ steps.generate-quote.outputs.author }}*
          branch: daily-quote
          delete-branch: true
          labels: inspiration, quote
          assignees: iiXXiXii
