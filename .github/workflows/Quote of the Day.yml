name: Daily Inspiration Quote

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create quotes file if it doesn't exist
        run: |
          if [ ! -f ./quotes.json ]; then
            echo '[{"quote": "Code is like humor. When you have to explain it, it's bad.", "author": "Cory House"}, {"quote": "Clean code always looks like it was written by someone who cares.", "author": "Robert C. Martin"}, {"quote": "Programming isn't about what you know; it's about what you can figure out.", "author": "Chris Pine"}]' > quotes.json
          fi

      - name: Generate Quote
        uses: actions/github-script@v6
        id: generate-quote
        with:
          script: |
            const fs = require('fs');
            const quotes = JSON.parse(fs.readFileSync('./quotes.json', 'utf8'));
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            console.log(`Quote: ${randomQuote.quote}`);
            console.log(`Author: ${randomQuote.author}`);
            core.setOutput('quote', randomQuote.quote);
            core.setOutput('author', randomQuote.author);

      - name: Update README
        run: |
          sed -i 's/<!-- QUOTE-PLACEHOLDER -->.*<!-- QUOTE-PLACEHOLDER-END -->/<!-- QUOTE-PLACEHOLDER -->\n> **"${{ steps.generate-quote.outputs.quote }}"**\n>\n> — *${{ steps.generate-quote.outputs.author }}*\n<!-- QUOTE-PLACEHOLDER-END -->/' README.md

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "📝 Daily inspiration quote update"
          committer_name: GitHub Actions
          committer_email: 41898282+github-actions[bot]@users.noreply.github.com
