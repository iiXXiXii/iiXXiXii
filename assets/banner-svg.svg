<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <!-- Particle effect definition -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite operator="over" in="SourceGraphic" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Abstract tech pattern -->
  <path d="M0,150 L1200,150" stroke="#3a7bd5" stroke-width="1" stroke-opacity="0.3" />
  <path d="M600,0 L600,300" stroke="#3a7bd5" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- Grid pattern -->
  <g stroke="#3a7bd5" stroke-width="0.5" stroke-opacity="0.2">
    <path d="M0,50 L1200,50" />
    <path d="M0,100 L1200,100" />
    <path d="M0,200 L1200,200" />
    <path d="M0,250 L1200,250" />
    <path d="M100,0 L100,300" />
    <path d="M200,0 L200,300" />
    <path d="M300,0 L300,300" />
    <path d="M400,0 L400,300" />
    <path d="M500,0 L500,300" />
    <path d="M700,0 L700,300" />
    <path d="M800,0 L800,300" />
    <path d="M900,0 L900,300" />
    <path d="M1000,0 L1000,300" />
    <path d="M1100,0 L1100,300" />
  </g>
  
  <!-- Particles -->
  <g filter="url(#glow)">
    <circle cx="150" cy="50" r="3" fill="#00d2ff" />
    <circle cx="420" cy="120" r="2" fill="#00d2ff" />
    <circle cx="700" cy="80" r="4" fill="#00d2ff" />
    <circle cx="900" cy="220" r="3" fill="#00d2ff" />
    <circle cx="300" cy="250" r="2" fill="#00d2ff" />
    <circle cx="1100" cy="150" r="3" fill="#00d2ff" />
    <circle cx="600" cy="200" r="2" fill="#00d2ff"